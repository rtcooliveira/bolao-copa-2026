name: Atualizar Bolão Copa 2026

on:
  schedule:
    - cron: '13,43 * * * *'   # 2x/hora em minutos ímpares (fora do pico do GitHub p/ evitar atraso)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: pip install requests

      - name: Atualizar resultados
        run: python bolao-copa-2026-atualizar.py update
